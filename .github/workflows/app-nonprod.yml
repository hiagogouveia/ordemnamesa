name: App NONPROD — Build & Deploy

on:
  push:
    branches:
      - develop
    paths:
      - "app/**"
      - "components/**"
      - "lib/**"
      - "public/**"
      - "middleware.ts"
      - "next.config.ts"
      - "lead-control-hub.config.ts"
      - "package.json"
      - "package-lock.json"
      - "infra/docker/**"
      - ".github/workflows/app-nonprod.yml"
  workflow_dispatch:
    inputs:
      force_deploy:
        description: "Forçar deploy mesmo sem mudanças"
        type: boolean
        default: false

permissions:
  contents: read
  packages: write

# Serializa deploys do mesmo ambiente: nunca dois workflows NONPROD ao mesmo tempo.
# cancel-in-progress: false → um deploy em andamento sempre conclui; o próximo aguarda na fila.
concurrency:
  group: deploy-nonprod
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/ordem-na-mesa-web

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest

    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=nonprod-,format=short
            type=raw,value=nonprod-latest

      # Extrair vars NEXT_PUBLIC_* do secret único NONPROD_APP_ENV para build-args
      - name: Extrair vars de build
        run: echo "${{ secrets.NONPROD_APP_ENV }}" | grep -E "^NEXT_PUBLIC_" >> $GITHUB_ENV

      - name: Build e Push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_SUPABASE_URL=${{ env.NEXT_PUBLIC_SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ env.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
            NEXT_PUBLIC_SITE_URL=${{ env.NEXT_PUBLIC_SITE_URL }}
            NEXT_PUBLIC_PHOTO_TRACE=${{ env.NEXT_PUBLIC_PHOTO_TRACE }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:nonprod-latest
          cache-to: type=inline

  deploy:
    name: Deploy na VM
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: nonprod

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copiar docker-compose e traefik config para VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VM_HOST }}
          username: ubuntu
          key: ${{ secrets.VM_SSH_PRIVATE_KEY }}
          source: "infra/docker/docker-compose.yml,infra/docker/traefik/traefik.yml"
          target: /opt/ordemnamesa/
          strip_components: 2

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          APP_ENV: ${{ secrets.NONPROD_APP_ENV }}
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
        with:
          host: ${{ secrets.VM_HOST }}
          username: ubuntu
          key: ${{ secrets.VM_SSH_PRIVATE_KEY }}
          envs: APP_ENV,IMAGE_TAG
          script: |
            set -euo pipefail

            cd /opt/ordemnamesa

            # Autenticar no GHCR para pull de imagem privada
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Escrever .env whitelistando apenas chaves conhecidas da aplicação
            # (protege contra secret contendo comentários, SSH keys ou outras vars)
            {
              printf '%s\n' "$APP_ENV" | grep -E '^(NEXT_PUBLIC_SUPABASE_URL|NEXT_PUBLIC_SUPABASE_ANON_KEY|NEXT_PUBLIC_SITE_URL|SUPABASE_SERVICE_ROLE_KEY|RESEND_API_KEY|RESEND_FROM|WHATSAPP_ADMIN_NUMBER|STRIPE_SECRET_KEY|STRIPE_WEBHOOK_SECRET|CRON_SECRET|PHOTO_RETENTION_DAYS)=' || true
              printf 'IMAGE_TAG=%s\n' "$IMAGE_TAG"
            } > .env

            # Mover traefik.yml para o diretório correto
            mkdir -p traefik
            [ -f traefik.yml ] && mv traefik.yml traefik/traefik.yml || true

            # Garantir acme.json com permissões corretas
            touch traefik/acme.json
            chmod 600 traefik/acme.json

            # Pull da nova imagem e restart idempotente
            docker compose pull nextjs
            docker compose up -d --remove-orphans

            # ── GATE DE DEPLOY ────────────────────────────────────────────────
            #
            # Antes disto, o deploy fazia `up -d` e saía com código 0. Uma imagem em
            # CRASHLOOP resultava num deploy VERDE — ninguém era avisado.
            #
            # Agora esperamos a aplicação ficar REALMENTE pronta (readiness: banco e
            # Storage alcançáveis), e falhamos o deploy se ela não ficar.
            #
            # 127.0.0.1 (e não `localhost`): há falso-negativo conhecido quando `localhost`
            # resolve para IPv6 dentro do container.
            echo "=== Aguardando a aplicação ficar saudável ==="
            HEALTHY=0
            for i in $(seq 1 30); do
              if docker compose exec -T nextjs wget -qO- http://127.0.0.1:3000/api/health/ready >/dev/null 2>&1; then
                echo "Aplicação saudável após ${i} tentativa(s)."
                HEALTHY=1
                break
              fi
              sleep 3
            done

            if [ "$HEALTHY" -ne 1 ]; then
              echo "::error::Deploy subiu, mas a aplicação NÃO ficou saudável em 90s. Veja os logs abaixo."
              docker compose ps
              docker compose logs --tail=80 nextjs
              exit 1
            fi

            # Limpeza pós-deploy: remove SOMENTE imagens dangling (sem tag), que são
            # as versões antigas desreferenciadas a cada deploy.
            # Agora roda DEPOIS do gate: não faz sentido fazer housekeeping num deploy
            # que falhou — e o operador que vai investigar encontra a máquina como estava.
            # Nunca remove imagem em uso, Traefik, volumes ou networks.
            # Resiliente: uma falha na limpeza jamais marca um deploy OK como falho.
            docker image prune -f || echo "AVISO: prune pós-deploy falhou (não crítico), seguindo."

            # Verificar status
            echo "=== Status dos containers ==="
            docker compose ps
