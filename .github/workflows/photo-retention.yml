name: data-retention

# Retenção de dados:
#  1) Fotos de evidência > PHOTO_RETENTION_DAYS (preserva o registro de execução).
#  2) Histórico de execução > HISTORY_RETENTION_DAYS (apaga task_executions/
#     checklist_assumptions/task_issues; NUNCA definições de rotina nem recebimentos).
# Chama as rotas protegidas /api/cron/{photo,history}-retention com o CRON_SECRET.
#
# Secrets necessários no repositório:
#   PHOTO_RETENTION_URL  -> ex.: https://app.ordemnamesa.com/api/cron/photo-retention
#   CRON_SECRET          -> mesmo valor do env CRON_SECRET do app (PROD)
# A URL de histórico é derivada da PHOTO_RETENTION_URL (mesmo host) — sem novo secret.

on:
  schedule:
    - cron: "0 4 * * 1" # toda segunda 04:00 UTC
  workflow_dispatch:
    inputs:
      dryRun:
        description: "Rodar em modo dry-run (não apaga nada)"
        type: boolean
        default: true

jobs:
  run-retention:
    runs-on: ubuntu-latest
    steps:
      - name: Chamar rotina de retenção
        run: |
          # Agendado = execução real; dispatch manual respeita o input (default dry-run).
          if [ "${{ github.event_name }}" = "schedule" ]; then
            DRY_RUN="false"
          else
            DRY_RUN="${{ github.event.inputs.dryRun }}"
          fi
          echo "dryRun=$DRY_RUN"

          HTTP_CODE=$(curl -sS -o response.json -w "%{http_code}" \
            -X POST "${{ secrets.PHOTO_RETENTION_URL }}?dryRun=$DRY_RUN" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}")

          echo "HTTP $HTTP_CODE"
          cat response.json
          echo ""

          if [ "$HTTP_CODE" -ne 200 ]; then
            echo "::error::Rotina de retenção de fotos falhou (HTTP $HTTP_CODE)"
            exit 1
          fi

      # Retenção de HISTÓRICO de execução (deleção irreversível).
      # Por segurança, roda SOMENTE em dispatch manual por enquanto (respeita o input dryRun).
      # Após validar em PROD (dry-run -> real manual), trocar a condição do `if` abaixo para
      # incluir `github.event_name == 'schedule'` e passar a rodar no cron semanal.
      - name: Chamar rotina de retenção de histórico
        if: github.event_name == 'workflow_dispatch'
        run: |
          DRY_RUN="${{ github.event.inputs.dryRun }}"
          echo "dryRun=$DRY_RUN"

          # Deriva a URL de histórico da URL de fotos (mesmo host) — sem novo secret.
          HISTORY_URL="${PHOTO_URL/photo-retention/history-retention}"
          echo "endpoint=$HISTORY_URL"

          HTTP_CODE=$(curl -sS -o response.json -w "%{http_code}" \
            -X POST "$HISTORY_URL?dryRun=$DRY_RUN" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}")

          echo "HTTP $HTTP_CODE"
          cat response.json
          echo ""

          if [ "$HTTP_CODE" -ne 200 ]; then
            echo "::error::Rotina de retenção de histórico falhou (HTTP $HTTP_CODE)"
            exit 1
          fi
        env:
          PHOTO_URL: ${{ secrets.PHOTO_RETENTION_URL }}
