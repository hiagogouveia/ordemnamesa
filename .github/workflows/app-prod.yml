name: App PROD — Build & Deploy

on:
  push:
    branches:
      - main
    paths:
      - "app/**"
      - "components/**"
      - "lib/**"
      - "public/**"
      - "middleware.ts"
      - "next.config.ts"
      - "package.json"
      - "package-lock.json"
      - "infra/docker/**"
      - ".github/workflows/app-prod.yml"
  workflow_dispatch:
    inputs:
      force_deploy:
        description: "Forçar deploy mesmo sem mudanças"
        type: boolean
        default: false

permissions:
  contents: read
  packages: write

# Serializa deploys do mesmo ambiente: nunca dois workflows PROD ao mesmo tempo.
# cancel-in-progress: false → um deploy em andamento sempre conclui; o próximo aguarda na fila.
concurrency:
  group: deploy-prod
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/ordem-na-mesa-web

jobs:
  build-and-push:
    name: Build & Push Docker Image (PROD)
    runs-on: ubuntu-latest

    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=prod-,format=short
            type=raw,value=prod-latest

      # Extrair vars NEXT_PUBLIC_* do secret único PROD_APP_ENV para build-args
      - name: Extrair vars de build
        run: echo "${{ secrets.PROD_APP_ENV }}" | grep -E "^NEXT_PUBLIC_" >> $GITHUB_ENV

      - name: Build e Push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_SUPABASE_URL=${{ env.NEXT_PUBLIC_SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ env.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
            NEXT_PUBLIC_SITE_URL=${{ env.NEXT_PUBLIC_SITE_URL }}
            NEXT_PUBLIC_PHOTO_TRACE=${{ env.NEXT_PUBLIC_PHOTO_TRACE }}
            NEXT_PUBLIC_SUPPORT_EMAIL=${{ env.NEXT_PUBLIC_SUPPORT_EMAIL }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:prod-latest
          cache-to: type=inline

  deploy:
    name: Deploy na VPS PROD
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: prod

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copiar configs para VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.PROD_VM_HOST }}
          username: root
          key: ${{ secrets.PROD_VM_SSH_PRIVATE_KEY }}
          source: "infra/docker/docker-compose.yml,infra/docker/traefik/traefik.yml,infra/docker/traefik/routes.prod.yml,infra/gatus/config.yaml,infra/docker/app-env.list"
          target: /opt/ordemnamesa-prod/
          strip_components: 2

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          APP_ENV: ${{ secrets.PROD_APP_ENV }}
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
          # SHA do commit servido. Reportado por /api/health.
          # NAO reutilizar IMAGE_TAG: o docker/metadata resolve `version` para a tag
          # `*-latest`, que nao identifica o commit — perdendo o proposito.
          APP_VERSION: ${{ github.sha }}
        with:
          host: ${{ secrets.PROD_VM_HOST }}
          username: root
          key: ${{ secrets.PROD_VM_SSH_PRIVATE_KEY }}
          envs: APP_ENV,IMAGE_TAG,APP_VERSION
          script: |
            set -euo pipefail

            cd /opt/ordemnamesa-prod

            # Autenticar no GHCR para pull de imagem privada
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Escrever .env whitelistando apenas chaves conhecidas da aplicação (protege
            # contra o secret conter comentários, SSH keys ou outras vars). A whitelist é
            # DERIVADA da fonte única infra/docker/app-env.list (scp'd para cá): adicionar
            # uma var de runtime é uma linha LÁ, não editar este workflow em 4 lugares.
            WHITELIST=$(grep -vE '^[[:space:]]*(#|$)' app-env.list | paste -sd '|' -)
            if [ -z "$WHITELIST" ]; then
              echo "::error::app-env.list vazio ou ausente — abortando para não subir o container sem env."
              exit 1
            fi
            {
              printf '%s\n' "$APP_ENV" | grep -E "^(${WHITELIST})=" || true
              printf 'IMAGE_TAG=%s\n' "$IMAGE_TAG"
              printf 'APP_VERSION=%s\n' "$APP_VERSION"
              # Parametriza o compose ÚNICO (F8b): nomes de projeto/rede/container.
              printf 'DEPLOY_ENV=prod\n'
              # CUTOVER FEITO: o worker EXECUTA os jobs (sem WORKER_OBSERVE). Para voltar
              # tudo a observar num incidente: printf 'WORKER_OBSERVE=1\n' aqui. Um job
              # específico: UPDATE job_state SET enabled=false (kill switch, sem deploy).
            } > .env

            # Compose e traefik.yml agora são COMPARTILHADOS (F8b) e já caem no lugar certo
            # (docker-compose.yml na raiz; traefik.yml em traefik/). Só o routes é por-domínio:
            # o prod usa routes.prod.yml, renomeado para o nome que o compose monta.
            mkdir -p traefik
            [ -f traefik/routes.prod.yml ] && mv -f traefik/routes.prod.yml traefik/routes.yml || true

            # Config do Gatus (strip_components deixou config.yaml na raiz → move para gatus/)
            mkdir -p gatus
            [ -f config.yaml ] && mv -f config.yaml gatus/config.yaml || true

            # Garantir acme.json com permissões corretas
            touch traefik/acme.json
            chmod 600 traefik/acme.json

            # Pull da nova imagem e restart idempotente
            docker compose pull nextjs
            docker compose up -d --remove-orphans

            # ── GATE DE DEPLOY ────────────────────────────────────────────────
            #
            # Antes disto, o deploy fazia `up -d` e saía com código 0. Uma imagem em
            # CRASHLOOP resultava num deploy VERDE: ninguém era avisado, e o site ficava
            # fora até alguém reparar por acaso.
            #
            # Agora esperamos a aplicação ficar REALMENTE pronta (readiness: banco e
            # Storage alcançáveis), e falhamos o deploy se ela não ficar.
            #
            # 127.0.0.1 (e não `localhost`): há falso-negativo conhecido quando `localhost`
            # resolve para IPv6 dentro do container.
            echo "=== Aguardando a aplicação ficar saudável ==="
            HEALTHY=0
            for i in $(seq 1 30); do
              if docker compose exec -T nextjs wget -qO- http://127.0.0.1:3000/api/health/ready >/dev/null 2>&1; then
                echo "Aplicação saudável após ${i} tentativa(s)."
                HEALTHY=1
                break
              fi
              sleep 3
            done

            if [ "$HEALTHY" -ne 1 ]; then
              echo "::error::Deploy subiu, mas a aplicação NÃO ficou saudável em 90s. Veja os logs abaixo."
              docker compose ps
              docker compose logs --tail=80 nextjs
              exit 1
            fi

            # Limpeza pós-deploy: remove SOMENTE imagens dangling (sem tag), que são
            # as versões antigas desreferenciadas a cada deploy.
            # Agora roda DEPOIS do gate: não faz sentido fazer housekeeping num deploy
            # que falhou — e o operador que vai investigar encontra a máquina como estava.
            # Nunca remove imagem em uso, Traefik, volumes ou networks.
            # Resiliente: uma falha na limpeza jamais marca um deploy OK como falho.
            docker image prune -f || echo "AVISO: prune pós-deploy falhou (não crítico), seguindo."

            # Verificar status
            echo "=== Status dos containers PROD ==="
            docker compose ps
