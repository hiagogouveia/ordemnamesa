name: domain-events

# Rede de segurança do outbox de eventos de domínio (Central de Notificações, s90).
#
# A materialização das notificações acontece inline no request (fast-path). Este cron
# reprocessa os eventos que ficaram `pending` porque essa materialização falhou —
# banco instável, deploy no meio, bug. Backoff exponencial; `failed` (tentativas
# esgotadas) é terminal e não é repescado, ficando como evidência do problema.
#
# Substitui o comportamento antigo, em que um `catch` engolia o erro e a notificação
# simplesmente sumia sem deixar rastro.
#
# Secrets necessários no repositório:
#   DOMAIN_EVENTS_URL -> ex.: https://ordemnamesa.com.br/api/cron/domain-events
#   CRON_SECRET       -> mesmo valor do env CRON_SECRET do app (PROD)

on:
  # AGENDAMENTO DESLIGADO (s91): este job migrou para o WORKER interno (NONPROD já executa;
  # PROD assume no cutover). O secret DOMAIN_EVENTS_URL nunca foi criado, então o cron
  # falhava a cada 5 min com URL vazia (`curl (3) URL rejected`), gerando e-mail de erro.
  # Mantido só o disparo manual até a F6 remover a superfície HTTP de vez.
  workflow_dispatch:

jobs:
  process-outbox:
    runs-on: ubuntu-latest
    steps:
      - name: Reprocessar outbox de eventos de domínio
        run: |
          HTTP_CODE=$(curl -sS -o response.json -w "%{http_code}" \
            -X POST "${{ secrets.DOMAIN_EVENTS_URL }}" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}")

          echo "HTTP $HTTP_CODE"
          cat response.json
          echo ""

          if [ "$HTTP_CODE" -ne 200 ]; then
            echo "::error::Rotina de eventos de domínio falhou (HTTP $HTTP_CODE)"
            exit 1
          fi
