name: Infra PROD — Setup VPS

# Provisiona a VPS de PRODUÇÃO (Hostinger, VM pré-existente) via SSH, de forma idempotente.
# Usa a MESMA fonte de provisionamento do nonprod: infra/scripts/provision.sh. A diferença
# entre ambientes é só um punhado de env vars (aqui: APP_DIR de prod; swap e log caps LIGADOS,
# fechando a divergência histórica em que o PROD rodava sem eles).
#
# Quando rodar:
#   - Manualmente (workflow_dispatch + confirm) ao provisionar/atualizar a VPS.
#   - Automaticamente quando provision.sh ou este workflow mudarem.
#
# ATENÇÃO: rodar isto num PROD já no ar reinicia o Docker SE o daemon.json mudar (para
# aplicar o limite de log) — breve indisponibilidade. Rode numa janela de manutenção.

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Confirmar execução do setup na VPS de PRODUÇÃO"
        required: true
        type: boolean
        default: false
  push:
    branches:
      - main
    paths:
      - "infra/scripts/provision.sh"
      - ".github/workflows/infra-prod.yml"

jobs:
  setup-vps:
    name: Setup VPS PROD
    runs-on: ubuntu-latest
    environment: prod

    # Push automático sempre; dispatch só com confirm=true.
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.confirm == 'true')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copiar provision.sh para a VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.PROD_VM_HOST }}
          username: root
          key: ${{ secrets.PROD_VM_SSH_PRIVATE_KEY }}
          source: "infra/scripts/provision.sh"
          target: /opt/
          strip_components: 2

      - name: Executar provision.sh (params de PROD)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_VM_HOST }}
          username: root
          key: ${{ secrets.PROD_VM_SSH_PRIVATE_KEY }}
          script: |
            set -euo pipefail
            echo "=== Provisionamento idempotente da VPS PROD (provision.sh) ==="
            chmod +x /opt/provision.sh
            # PROD roda como root; ganha swap + log caps (paridade com o NONPROD). Demais
            # parâmetros usam os defaults do provision.sh (prune Mon,Thu; log 10m/3).
            APP_USER=root \
            APP_DIR=/opt/ordemnamesa-prod \
            ENABLE_SWAP=true \
            bash /opt/provision.sh
