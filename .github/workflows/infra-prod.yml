name: Infra PROD — Setup VPS

# Equivalente ao userdata.sh do nonprod (cloud-init via Terraform).
# Para nonprod, a VM nasce configurada pelo cloud-init automático.
# Para prod (Hostinger, VM pré-existente), este workflow é o equivalente:
# configura a VPS via SSH de forma idempotente.
#
# Quando rodar:
#   - Manualmente (workflow_dispatch) ao provisionar nova VPS
#   - Automaticamente quando o script de setup mudar

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Confirmar execução do setup na VPS de PRODUÇÃO"
        required: true
        type: boolean
        default: false
  push:
    branches:
      - main
    paths:
      - "infra/scripts/setup-prod.sh"
      - ".github/workflows/infra-prod.yml"

jobs:
  setup-vps:
    name: Setup VPS PROD
    runs-on: ubuntu-latest
    environment: prod

    # Proteção extra: só executa se confirmado (no dispatch) ou via push automático
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.confirm == 'true')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Executar setup idempotente na VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_VM_HOST }}
          username: root
          key: ${{ secrets.PROD_VM_SSH_PRIVATE_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            echo "=== Iniciando setup idempotente da VPS PROD ==="

            export DEBIAN_FRONTEND=noninteractive

            # Parar serviços que seguram o lock do apt
            systemctl stop unattended-upgrades 2>/dev/null || true
            systemctl stop apt-daily.service apt-daily-upgrade.service 2>/dev/null || true

            # Aguardar qualquer lock restante
            for i in $(seq 1 30); do
              fuser /var/lib/apt/lists/lock /var/lib/dpkg/lock-frontend /var/lib/dpkg/lock 2>/dev/null || break
              echo "Aguardando lock apt ($i/30)..."
              sleep 3
            done

            # Instalar dependências mínimas (sem upgrade — evita mirror sync lento)
            apt-get install -y ca-certificates curl unzip htop git jq

            # Instalar Docker via script oficial (idempotente)
            if ! command -v docker &>/dev/null; then
              echo "Instalando Docker..."
              curl -fsSL https://get.docker.com | sh
              systemctl enable docker
              systemctl start docker
            else
              echo "Docker já instalado: $(docker --version)"
            fi

            # Criar estrutura de diretórios da aplicação
            APP_DIR="/opt/ordemnamesa-prod"
            mkdir -p "${APP_DIR}/traefik"
            mkdir -p "${APP_DIR}/data"
            touch "${APP_DIR}/traefik/acme.json"
            chmod 600 "${APP_DIR}/traefik/acme.json"

            # Resultado
            echo "=== Setup concluído ==="
            echo "Docker: $(docker --version)"
            echo "Docker Compose: $(docker compose version)"
            echo "Diretório: $(ls -la ${APP_DIR})"
