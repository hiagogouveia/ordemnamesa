name: Receiving — mark overdue

# Sprint 50: dispara a cada 15 minutos a varredura multi-tenant de expectativas
# de recebimento que passaram da janela esperada. Reutiliza GH Actions —
# infra já em uso pelo projeto — em vez de introduzir Vercel/Cron novo.
#
# Secrets esperados por ambiente (Settings → Environments → <env> → Secrets):
#   APP_URL                — base URL do app (ex: https://ordemnamesa.com.br)
#   RECEIVING_CRON_SECRET  — segredo compartilhado com a env RECEIVING_CRON_SECRET do app
#
# Ative o workflow em prod/nonprod separadamente pela coluna `environment`.

on:
  schedule:
    # A cada 15 minutos. Atrasos > 11 min na janela já viram overdue ASAP.
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  sweep:
    name: Sweep overdue (prod)
    runs-on: ubuntu-latest
    environment: prod
    timeout-minutes: 2
    steps:
      - name: Trigger mark-overdue
        env:
          APP_URL: ${{ secrets.APP_URL }}
          RECEIVING_CRON_SECRET: ${{ secrets.RECEIVING_CRON_SECRET }}
        run: |
          if [ -z "$APP_URL" ] || [ -z "$RECEIVING_CRON_SECRET" ]; then
            echo "Secrets APP_URL / RECEIVING_CRON_SECRET não configurados — pulando."
            exit 0
          fi
          curl -sS --fail-with-body -X POST \
            -H "x-cron-secret: $RECEIVING_CRON_SECRET" \
            -H "Content-Type: application/json" \
            "$APP_URL/api/receiving-expectations/mark-overdue"
