name: admin-notifications

# Reprocessa o outbox de notificações administrativas por e-mail (novos leads):
# reenvia pendências/falhas com backoff. Complementa o envio imediato (after())
# feito na submissão do lead — garante entrega se o Resend estiver fora no momento.
#
# Secrets necessários no repositório:
#   ADMIN_NOTIFICATIONS_URL -> ex.: https://ordemnamesa.com.br/api/cron/admin-notifications
#   CRON_SECRET             -> mesmo valor do env CRON_SECRET do app (PROD)

on:
  schedule:
    - cron: "*/5 * * * *" # a cada 5 minutos
  workflow_dispatch:

jobs:
  process-outbox:
    runs-on: ubuntu-latest
    steps:
      - name: Reprocessar outbox de notificações
        run: |
          HTTP_CODE=$(curl -sS -o response.json -w "%{http_code}" \
            -X POST "${{ secrets.ADMIN_NOTIFICATIONS_URL }}" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}")

          echo "HTTP $HTTP_CODE"
          cat response.json
          echo ""

          if [ "$HTTP_CODE" -ne 200 ]; then
            echo "::error::Rotina de notificações administrativas falhou (HTTP $HTTP_CODE)"
            exit 1
          fi
