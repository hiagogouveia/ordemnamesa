name: routines-delayed

# Detecta rotinas atrasadas e notifica os gestores (Central de Notificações, s90).
#
# Por que este e o unico tipo de notificacao que precisa de cron: "atrasado" e o unico
# estado do dominio que NAO e um fato registrado. O banco nunca grava "isto atrasou as
# 14h03" — e derivado, comparando o horario-limite da rotina com a hora atual. Nao ha
# INSERT nem UPDATE para reagir; alguem precisa OLHAR o relogio.
#
# Rodar a cada 15 min e seguro: a dedup_key inclui o dia
# (`delayed:<checklist_id>:<date_key>`), entao o indice UNIQUE garante NO MAXIMO UMA
# notificacao por rotina/dia. Sem isso, cada varredura geraria um novo alerta.
#
# 15 min (e nao 5) porque o atraso nao e urgente ao minuto, e a varredura percorre todos
# os restaurantes ativos.
#
# Secrets necessarios no repositorio:
#   ROUTINES_DELAYED_URL -> ex.: https://ordemnamesa.com.br/api/cron/routines-delayed
#   CRON_SECRET          -> mesmo valor do env CRON_SECRET do app (PROD)

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  detect-delayed:
    runs-on: ubuntu-latest
    steps:
      - name: Detectar rotinas atrasadas
        run: |
          HTTP_CODE=$(curl -sS -o response.json -w "%{http_code}" \
            -X POST "${{ secrets.ROUTINES_DELAYED_URL }}" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}")

          echo "HTTP $HTTP_CODE"
          cat response.json
          echo ""

          if [ "$HTTP_CODE" -ne 200 ]; then
            echo "::error::Deteccao de rotinas atrasadas falhou (HTTP $HTTP_CODE)"
            exit 1
          fi
