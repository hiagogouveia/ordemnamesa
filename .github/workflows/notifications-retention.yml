name: notifications-retention

# Retencao da Central de Notificacoes (s90). Diario.
#
#   - Lidas: apagar apos 90 dias.
#   - Nao lidas: apagar apos 180 dias (uma nao-lida ha 6 meses nao e acionavel — e ruido
#     que infla o badge e esconde o que importa).
#   - domain_events processados: apagar apos 90 dias.
#   - domain_events FALHADOS: RETER. Sao evidencia de bug, nao lixo — apaga-los destruiria
#     exatamente a informacao que o outbox existe para preservar.
#
# Sem tabela de arquivo: a trilha analitica vive em event_logs (com retencao propria),
# entao apagar a linha da notificacao nao perde nada auditavel.
#
# Efeito colateral bem-vindo: o renderer de notificacoes LEGADAS (sem payload tipado) e
# temporario POR CONSTRUCAO — em 90 dias essas linhas envelhecem e somem sozinhas.
#
# Secrets necessarios no repositorio:
#   NOTIFICATIONS_RETENTION_URL -> ex.: https://ordemnamesa.com.br/api/cron/notifications-retention
#   CRON_SECRET                 -> mesmo valor do env CRON_SECRET do app (PROD)

on:
  schedule:
    - cron: "17 4 * * *" # 04:17 UTC, diario (fora do pico)
  workflow_dispatch:

jobs:
  retention:
    runs-on: ubuntu-latest
    steps:
      - name: Aplicar retencao de notificacoes
        run: |
          HTTP_CODE=$(curl -sS -o response.json -w "%{http_code}" \
            -X POST "${{ secrets.NOTIFICATIONS_RETENTION_URL }}" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}")

          echo "HTTP $HTTP_CODE"
          cat response.json
          echo ""

          if [ "$HTTP_CODE" -ne 200 ]; then
            echo "::error::Retencao de notificacoes falhou (HTTP $HTTP_CODE)"
            exit 1
          fi
