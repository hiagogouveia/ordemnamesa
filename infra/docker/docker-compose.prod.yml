name: ordem-na-mesa-prod

networks:
  proxy:
    name: ordem-na-mesa-prod-proxy

volumes:
  traefik-acme:
    name: ordem-na-mesa-prod-acme

services:

  # ---------------------------------------------------------------------------
  # Traefik — proxy reverso + SSL automático via Let's Encrypt
  # ---------------------------------------------------------------------------
  traefik:
    image: traefik:v3.2
    container_name: ordem-na-mesa-prod-traefik
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /opt/ordemnamesa-prod/traefik/traefik.yml:/traefik.yml:ro
      - /opt/ordemnamesa-prod/traefik/routes.yml:/routes.yml:ro
      - /opt/ordemnamesa-prod/traefik/acme.json:/acme.json
    networks:
      - proxy
    healthcheck:
      test: ["CMD", "traefik", "healthcheck", "--ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ---------------------------------------------------------------------------
  # Next.js — aplicação web Ordem na Mesa (PRODUÇÃO)
  # ---------------------------------------------------------------------------
  nextjs:
    image: ghcr.io/hiagogouveia/ordem-na-mesa-web:${IMAGE_TAG:-prod-latest}
    container_name: ordem-na-mesa-prod-web
    restart: always
    expose:
      - "3000"
    # Todas as vars de runtime vêm do .env (fonte única: infra/docker/app-env.list, filtrado
    # pelo deploy). Aqui ficam só as COMPUTADAS/estáticas. APP_VERSION vem do .env também
    # (o deploy o escreve lá) — reportado por /api/health, pega deploy verde servindo imagem
    # antiga.
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
    networks:
      - proxy
    healthcheck:
      # 127.0.0.1 (IPv4) em vez de localhost: evita resolução para ::1 (IPv6),
      # que o Next.js standalone não escuta → corrige falso-negativo "unhealthy".
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ---------------------------------------------------------------------------
  # Worker — executor de jobs agendados (substitui o cron via GitHub Actions).
  # ---------------------------------------------------------------------------
  # MESMA imagem da app, command diferente: `node dist/worker.cjs` (o supervisor).
  # NÃO entra na rede `proxy` — não expõe HTTP, não é alcançável de fora. É um processo
  # de fundo, não um serviço web.
  #
  # F4: sobe em MODO OBSERVADOR (WORKER_OBSERVE=1) — registra em job_runs o que FARIA,
  # sem executar. Os workflows do GitHub seguem sendo a fonte de verdade. É o passo que
  # valida supervisor, lease, bundle e consumo de RAM em produção, sem risco.
  worker:
    image: ghcr.io/hiagogouveia/ordem-na-mesa-web:${IMAGE_TAG:-prod-latest}
    container_name: ordem-na-mesa-prod-worker
    restart: always
    command: ["node", "dist/worker.cjs"]
    # Janela de graça no shutdown: o supervisor fecha o portão e espera o filho em curso.
    stop_grace_period: 30s
    # Mesmo .env do web (fonte única). O worker ignora as vars que não usa.
    env_file:
      - .env
    environment:
      NODE_ENV: production
      # PROD ainda em MODO OBSERVADOR (F4): registra o que faria, sem executar. Os workflows
      # do GitHub seguem sendo a fonte de verdade até o cutover do PROD, onde esta linha sai
      # (ou vira WORKER_EXECUTE, para virar a chave um job por vez, como no NONPROD).
      WORKER_OBSERVE: "1"
    healthcheck:
      # O worker escreve /tmp/worker-alive a cada tick; o healthcheck confere a idade.
      # Serve para OBSERVAR (docker ps mostra unhealthy) — o restart de verdade quando
      # trava vem do self-watchdog interno (o Compose não reinicia por healthcheck).
      test: ["CMD-SHELL", "test $(( $(date +%s) - $(stat -c %Y /tmp/worker-alive 2>/dev/null || echo 0) )) -lt 60"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  # ---------------------------------------------------------------------------
  # Gatus — monitor da plataforma (health endpoints + monitoramento cruzado).
  # ---------------------------------------------------------------------------
  # Config 100% versionada em infra/gatus/config.yaml (montado read-only). O painel NAO e
  # exposto publicamente (sem rota no Traefik) — acesso por tunel SSH. O monitoramento
  # cruzado funciona por requisicoes de SAIDA aos health endpoints (ja publicos). Alerta
  # via Telegram (credenciais por env var — nada de token no repo publico).
  #
  # SEM healthcheck de propósito: a imagem e distroless (sem shell/wget/curl), entao
  # nenhum `test` roda dentro dela. Liveness do processo ja vem do `restart: always`.
  gatus:
    image: twinproduction/gatus:v5.13.1
    container_name: ordem-na-mesa-prod-gatus
    restart: always
    expose:
      - "8080"
    volumes:
      - /opt/ordemnamesa-prod/gatus/config.yaml:/config/config.yaml:ro
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
    networks:
      - proxy
