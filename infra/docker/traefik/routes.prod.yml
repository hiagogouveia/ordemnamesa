http:
  routers:
    nextjs-https:
      rule: "Host(`app.ordemnamesa.com.br`)"
      entryPoints:
        - websecure
      service: nextjs
      tls:
        certResolver: letsencrypt

    nextjs-http:
      rule: "Host(`app.ordemnamesa.com.br`)"
      entryPoints:
        - web
      middlewares:
        - redirect-https
      service: nextjs

  middlewares:
    redirect-https:
      redirectScheme:
        scheme: https
        permanent: true

  services:
    nextjs:
      loadBalancer:
        servers:
          - url: "http://nextjs:3000"
