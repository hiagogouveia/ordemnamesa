http:
  routers:
    nextjs-https:
      rule: "Host(`ordemnamesa.com.br`) || Host(`www.ordemnamesa.com.br`)"
      entryPoints:
        - websecure
      service: nextjs
      tls:
        certResolver: letsencrypt
        domains:
          - main: "ordemnamesa.com.br"
            sans:
              - "www.ordemnamesa.com.br"

    nextjs-http:
      rule: "Host(`ordemnamesa.com.br`) || Host(`www.ordemnamesa.com.br`)"
      entryPoints:
        - web
      middlewares:
        - redirect-https
      service: nextjs

  middlewares:
    redirect-https:
      redirectScheme:
        scheme: https
        permanent: true

  services:
    nextjs:
      loadBalancer:
        servers:
          - url: "http://nextjs:3000"
