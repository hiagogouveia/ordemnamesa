name: ordem-na-mesa-nonprod

networks:
  proxy:
    name: ordem-na-mesa-nonprod-proxy

volumes:
  traefik-acme:
    name: ordem-na-mesa-nonprod-acme

services:

  # ---------------------------------------------------------------------------
  # Traefik — proxy reverso + SSL automático via Let's Encrypt
  # ---------------------------------------------------------------------------
  traefik:
    image: traefik:v3.2
    container_name: ordem-na-mesa-nonprod-traefik
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /opt/ordemnamesa/traefik/traefik.yml:/traefik.yml:ro
      - /opt/ordemnamesa/traefik/routes.yml:/routes.yml:ro
      - /opt/ordemnamesa/traefik/acme.json:/acme.json
    networks:
      - proxy
    healthcheck:
      test: ["CMD", "traefik", "healthcheck", "--ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ---------------------------------------------------------------------------
  # Next.js — aplicação web Ordem na Mesa
  # ---------------------------------------------------------------------------
  nextjs:
    image: ghcr.io/hiagogouveia/ordem-na-mesa-web:${IMAGE_TAG:-nonprod-latest}
    container_name: ordem-na-mesa-nonprod-web
    restart: always
    expose:
      - "3000"
    environment:
      NODE_ENV: production
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
      # SHA do commit servido. Reportado por /api/health.
      # NÃO usar IMAGE_TAG aqui: ele vale "nonprod-latest", que não identifica commit nenhum.
      APP_VERSION: ${APP_VERSION:-unknown}
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      RESEND_API_KEY: ${RESEND_API_KEY}
      RESEND_FROM: ${RESEND_FROM}
      WHATSAPP_ADMIN_NUMBER: ${WHATSAPP_ADMIN_NUMBER}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      CRON_SECRET: ${CRON_SECRET}
      PHOTO_RETENTION_DAYS: ${PHOTO_RETENTION_DAYS}
    networks:
      - proxy
    healthcheck:
      # 127.0.0.1 (IPv4) em vez de localhost: evita resolução para ::1 (IPv6),
      # que o Next.js standalone não escuta → corrige falso-negativo "unhealthy".
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ---------------------------------------------------------------------------
  # Worker — executor de jobs agendados (substitui o cron via GitHub Actions).
  # ---------------------------------------------------------------------------
  # MESMA imagem da app, command `node dist/worker.cjs`. NÃO entra na rede `proxy` —
  # não expõe HTTP. F4: sobe em MODO OBSERVADOR (registra o que faria, sem executar).
  worker:
    image: ghcr.io/hiagogouveia/ordem-na-mesa-web:${IMAGE_TAG:-nonprod-latest}
    container_name: ordem-na-mesa-worker
    restart: always
    command: ["node", "dist/worker.cjs"]
    stop_grace_period: 30s
    environment:
      NODE_ENV: production
      APP_VERSION: ${APP_VERSION:-unknown}
      # F4 → observador. Remover (ou =0) na F5 liga a execução real de TODOS os jobs.
      WORKER_OBSERVE: "1"
      # F5 — allowlist de jobs que EXECUTAM DE VERDADE mesmo com o observe global ligado.
      # Vira a chave um por vez; os fora da lista seguem só observando. Ordem do menos ao
      # mais crítico: notifications-retention → photo/history → domain-events →
      # admin-notifications → routines-delayed.
      WORKER_EXECUTE: "notifications-retention,domain-events,admin-notifications"
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      RESEND_API_KEY: ${RESEND_API_KEY}
      RESEND_FROM: ${RESEND_FROM}
      PHOTO_RETENTION_DAYS: ${PHOTO_RETENTION_DAYS}
    healthcheck:
      test: ["CMD-SHELL", "test $(( $(date +%s) - $(stat -c %Y /tmp/worker-alive 2>/dev/null || echo 0) )) -lt 60"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  # ---------------------------------------------------------------------------
  # Gatus — monitor da plataforma (health endpoints + monitoramento cruzado).
  # ---------------------------------------------------------------------------
  # Painel NAO exposto publicamente (sem rota no Traefik) — acesso por tunel SSH. O
  # monitoramento cruzado funciona por requisicoes de SAIDA aos health endpoints.
  # SEM healthcheck de propósito: imagem distroless (sem shell/wget/curl) — nenhum `test`
  # roda dentro dela. Liveness do processo ja vem do `restart: always`.
  gatus:
    image: twinproduction/gatus:v5.13.1
    container_name: ordem-na-mesa-gatus
    restart: always
    expose:
      - "8080"
    volumes:
      - /opt/ordemnamesa/gatus/config.yaml:/config/config.yaml:ro
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
    networks:
      - proxy
