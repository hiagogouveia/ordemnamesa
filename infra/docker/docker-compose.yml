name: ordem-na-mesa-nonprod

networks:
  proxy:
    name: ordem-na-mesa-nonprod-proxy

volumes:
  traefik-acme:
    name: ordem-na-mesa-nonprod-acme

services:

  # ---------------------------------------------------------------------------
  # Traefik — proxy reverso + SSL automático via Let's Encrypt
  # ---------------------------------------------------------------------------
  traefik:
    image: traefik:v3.2
    container_name: ordem-na-mesa-nonprod-traefik
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /opt/ordemnamesa/traefik/traefik.yml:/traefik.yml:ro
      - /opt/ordemnamesa/traefik/routes.yml:/routes.yml:ro
      - /opt/ordemnamesa/traefik/acme.json:/acme.json
    networks:
      - proxy
    healthcheck:
      test: ["CMD", "traefik", "healthcheck", "--ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ---------------------------------------------------------------------------
  # Next.js — aplicação web Ordem na Mesa
  # ---------------------------------------------------------------------------
  nextjs:
    image: ghcr.io/hiagogouveia/ordem-na-mesa-web:${IMAGE_TAG:-nonprod-latest}
    container_name: ordem-na-mesa-nonprod-web
    restart: always
    expose:
      - "3000"
    # Todas as vars de runtime vêm do .env (fonte única: infra/docker/app-env.list, filtrado
    # pelo deploy). Aqui ficam só as COMPUTADAS/estáticas. APP_VERSION vem do .env também.
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
    networks:
      - proxy
    healthcheck:
      # 127.0.0.1 (IPv4) em vez de localhost: evita resolução para ::1 (IPv6),
      # que o Next.js standalone não escuta → corrige falso-negativo "unhealthy".
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ---------------------------------------------------------------------------
  # Worker — executor de jobs agendados (substitui o cron via GitHub Actions).
  # ---------------------------------------------------------------------------
  # MESMA imagem da app, command `node dist/worker.cjs`. NÃO entra na rede `proxy` —
  # não expõe HTTP. F4: sobe em MODO OBSERVADOR (registra o que faria, sem executar).
  worker:
    image: ghcr.io/hiagogouveia/ordem-na-mesa-web:${IMAGE_TAG:-nonprod-latest}
    container_name: ordem-na-mesa-worker
    restart: always
    command: ["node", "dist/worker.cjs"]
    stop_grace_period: 30s
    # Mesmo .env do web (fonte única). O worker ignora as vars que não usa; e agora recebe
    # HISTORY_RETENTION_DAYS de graça (antes só o web tinha, então o history-retention do
    # worker caía sempre no default 60).
    env_file:
      - .env
    environment:
      NODE_ENV: production
      # F5 CONCLUÍDA no NONPROD: todos os 6 jobs executam de verdade. Para voltar tudo a
      # observar em um incidente: WORKER_OBSERVE: "1" aqui. Um job específico:
      # WORKER_EXECUTE: "job-a,job-b" (allowlist do que executa com observe global ligado).
    healthcheck:
      test: ["CMD-SHELL", "test $(( $(date +%s) - $(stat -c %Y /tmp/worker-alive 2>/dev/null || echo 0) )) -lt 60"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  # ---------------------------------------------------------------------------
  # Gatus — monitor da plataforma (health endpoints + monitoramento cruzado).
  # ---------------------------------------------------------------------------
  # Painel NAO exposto publicamente (sem rota no Traefik) — acesso por tunel SSH. O
  # monitoramento cruzado funciona por requisicoes de SAIDA aos health endpoints.
  # SEM healthcheck de propósito: imagem distroless (sem shell/wget/curl) — nenhum `test`
  # roda dentro dela. Liveness do processo ja vem do `restart: always`.
  gatus:
    image: twinproduction/gatus:v5.13.1
    container_name: ordem-na-mesa-gatus
    restart: always
    expose:
      - "8080"
    volumes:
      - /opt/ordemnamesa/gatus/config.yaml:/config/config.yaml:ro
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
    networks:
      - proxy
